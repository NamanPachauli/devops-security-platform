services:

  mongodb:
    image: mongo
    container_name: devops-mongodb
    ports:
      - "27017:27017"

  auth-service:
    build: ./auth-service
    container_name: devops-auth
    ports:
      - "9092:9092"
    depends_on:
      - mongodb

  prometheus:
    image: prom/prometheus
    container_name: devops-prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    depends_on:
      - auth-service

  grafana:
    image: grafana/grafana
    container_name: devops-grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus